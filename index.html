<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.churn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .result.no-churn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .result h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .result p {
            font-size: 14px;
            opacity: 0.9;
        }

        .error {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fee;
            border-left: 4px solid #f44;
            border-radius: 4px;
            color: #c33;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-group {
                grid-template-columns: 1fr;
            }

            .form-group:nth-child(1),
            .form-group:nth-child(2) {
                margin-bottom: 0;
            }
        }

        .info-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .info-box strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Churn Prediction</h1>
            <p>Predict customer likelihood to churn</p>
        </div>

        <form id="predictionForm">
            <div class="input-group">
                <div class="form-group">
                    <label for="tenure">Tenure (months)</label>
                    <input 
                        type="number" 
                        id="tenure" 
                        placeholder="e.g., 12" 
                        min="0" 
                        step="1"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="monthlyCharges">Monthly Charges ($)</label>
                    <input 
                        type="number" 
                        id="monthlyCharges" 
                        placeholder="e.g., 70" 
                        min="0" 
                        step="0.01"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="totalCharges">Total Charges ($)</label>
                <input 
                    type="number" 
                    id="totalCharges" 
                    placeholder="e.g., 840" 
                    min="0" 
                    step="0.01"
                    required
                >
            </div>

            <button type="submit" id="predictBtn">Predict Churn</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea; font-size: 14px;">Analyzing...</p>
        </div>

        <div class="result" id="result">
            <h2 id="resultText"></h2>
            <p id="resultDetails"></p>
        </div>

        <div class="error" id="error">
            <strong>Error:</strong> <span id="errorMessage"></span>
        </div>

        <div class="info-box">
            <strong>ℹ️ How to use:</strong><br>
            Enter customer tenure (in months), monthly charges, and total charges. The model will predict whether the customer is likely to churn (cancel service).
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://ml-churn-prediction-production-94ad.up.railway.app';
        
        const form = document.getElementById('predictionForm');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        const resultText = document.getElementById('resultText');
        const resultDetails = document.getElementById('resultDetails');
        const errorMessage = document.getElementById('errorMessage');
        const predictBtn = document.getElementById('predictBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get input values
            const tenure = parseFloat(document.getElementById('tenure').value);
            const monthlyCharges = parseFloat(document.getElementById('monthlyCharges').value);
            const totalCharges = parseFloat(document.getElementById('totalCharges').value);

            // Reset UI
            error.style.display = 'none';
            result.style.display = 'none';
            loader.style.display = 'block';
            predictBtn.disabled = true;

            try {
                // Prepare request payload
                const payload = {
                    tenure,
                    monthly_charges: monthlyCharges,
                    total_charges: totalCharges
                };

                // Make API request
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                // Hide loader
                loader.style.display = 'none';

                // Display result
                const prediction = data.prediction;
                const isChurn = prediction === 1 || prediction === 'Churn' || prediction === 'Yes';
                
                resultText.textContent = isChurn ? '⚠️ Customer Will Churn' : '✅ Customer Will Stay';
                resultDetails.textContent = isChurn 
                    ? 'High likelihood of service cancellation' 
                    : 'Low likelihood of service cancellation';

                result.className = isChurn ? 'result churn' : 'result no-churn';
                result.style.display = 'block';

            } catch (err) {
                // Hide loader
                loader.style.display = 'none';

                // Display error
                errorMessage.textContent = err.message || 'Failed to connect to the API. Please check your internet connection and try again.';
                error.style.display = 'block';

                console.error('Error:', err);
            } finally {
                predictBtn.disabled = false;
            }
        });

        // Add real-time validation feedback
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                if (error.style.display !== 'none') {
                    error.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>

services:
  api:
    build: .
    container_name: churn-prediction-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PORT=8000
    volumes:
      - ./src:/app/src/
      - ./models:/app/models/
      - ./data:/app/data/
      - ./mlruns:/app/mlruns/
    depends_on:
      - mlflow
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.example.description=ML API Service"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: churn-prediction-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlruns/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlruns
    volumes:
      - ./mlruns:/mlruns
    networks:
      - ml-network
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.example.description=MLflow Tracking Server"

networks:
  ml-network:
    driver: bridge

volumes:
  mlruns:
    driver: local
  models:
    driver: local
  data:
    driver: local
